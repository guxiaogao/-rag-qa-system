<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北师大智能问答系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; }
  .chat-container { max-width: 800px; margin: 0 auto; padding: 20px; }
  .header { background: #003d7a; color: white; padding: 16px; text-align: center; border-radius: 8px 8px 0 0; }
  .header h1 { font-size: 20px; }
  .messages { height: 60vh; overflow-y: auto; padding: 20px; background: white; border: 1px solid #e0e0e0; }
  .msg { margin-bottom: 16px; display: flex; gap: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .msg.assistant .avatar { background: #e3f2fd; color: #003d7a; }
  .msg.user .avatar { background: #003d7a; color: white; }
  .msg .text { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
  .msg.user .text { background: #003d7a; color: white; }
  .msg.assistant .text { background: #f0f0f0; color: #333; }
  .msg .meta { font-size: 12px; color: #999; margin-top: 4px; }
  .msg.assistant .text ul, .msg.assistant .text ol { padding-left: 20px; margin: 6px 0; }
  .msg.assistant .text li { margin: 2px 0; }
  .msg.assistant .text strong { color: #003d7a; }
  .msg.assistant .text code { background: #e8e8e8; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
  .msg.assistant .text p { margin: 4px 0; }
  .msg.assistant .text p:first-child { margin-top: 0; }
  .msg.assistant .text p:last-child { margin-bottom: 0; }
  .msg.assistant .text h1,.msg.assistant .text h2,.msg.assistant .text h3 { font-size: 16px; margin: 8px 0 4px; }
  .input-area { background: white; padding: 16px; border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; display: flex; gap: 10px; }
  .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
  .input-area input:focus { border-color: #003d7a; }
  .input-area button { padding: 10px 24px; background: #003d7a; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading { color: #999; font-style: italic; padding: 10px; }
  .sources { font-size: 12px; color: #888; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  .sources a { color: #003d7a; cursor: default; }
  .toolbar { display: flex; padding: 8px 16px; background: white; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; justify-content: flex-end; gap: 8px; }
  .toolbar button.upload-btn { padding:4px 12px; background:#e8f5e9; border:1px solid #4caf50; color:#2e7d32; border-radius:4px; cursor:pointer; font-size:13px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:8px; font-size:14px; z-index:9999; box-shadow:0 2px 12px rgba(0,0,0,0.15); }
  .toast.ok { background:#e8f5e9; color:#2e7d32; border:1px solid #4caf50; }
  .toast.err { background:#fce4ec; color:#c62828; border:1px solid #e53935; }
  .web-toggle { display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid #ddd; border-radius:20px; font-size:13px; cursor:pointer; user-select:none; transition:all 0.2s; white-space:nowrap; }
  .web-toggle.on { background:#e3f2fd; border-color:#003d7a; color:#003d7a; }
  .web-toggle .dot { width:8px; height:8px; border-radius:50%; background:#ccc; }
  .web-toggle.on .dot { background:#003d7a; }
  .web-indicator { font-size:12px; color:#666; margin-top:4px; }
  .web-indicator.active { color:#003d7a; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="chat-container">
  <div class="header"><h1>🏫 北师大智能问答助手</h1></div>
  <div class="messages" id="messages"></div>
  <div class="toolbar">
    <button class="upload-btn" onclick="uploadDoc()">📎 上传资料</button>
    <button onclick="newChat()" style="padding:4px 12px;background:#eee;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:13px;">🔄 新对话</button>
  </div>
  <div class="input-area">
    <input id="query" placeholder="输入问题，比如：违纪怎么处理？" onkeydown="if(event.key==='Enter') send()"/>
    <label class="web-toggle" id="webToggle" onclick="toggleWeb()" title="勾选后强制搜索网络补充资料">
      <span class="dot"></span> 联网
    </label>
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>
<script>
const API = '/api/chat';
const UPLOAD_API = '/api/documents/upload';
const MAX_HISTORY = 6;  // 最近 3 轮对话（每轮 = 用户 + 助手）
let conversationHistory = [];
let _fileInput = null;
let forceWebSearch = false;

function toggleWeb() {
  forceWebSearch = !forceWebSearch;
  const el = document.getElementById('webToggle');
  if (forceWebSearch) el.classList.add('on'); else el.classList.remove('on');
}

function addMsg(role, text, sources) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  // 头像 — 纯字面量，safe
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '我' : 'AI';
  div.appendChild(avatar);

  // 消息体容器
  const body = document.createElement('div');

  // 文本 — 使用 textContent，防止 XSS
  const textDiv = document.createElement('div');
  textDiv.className = 'text';
  textDiv.textContent = text;
  body.appendChild(textDiv);

  // 参考来源 — 每个文件名用 textContent，防止注入
  if (sources && sources.length) {
    const srcDiv = document.createElement('div');
    srcDiv.className = 'sources';
    const names = sources.map((s, i) => `[${i + 1}] ${s.filename}`).join('，');
    srcDiv.textContent = '📎 参考来源：' + names;
    body.appendChild(srcDiv);
  }

  div.appendChild(body);
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function newChat() {
  conversationHistory = [];
  document.getElementById('messages').innerHTML = '';
  const input = document.getElementById('query');
  if (input) input.value = '';
  addMsg('assistant', '嗨～我是北师大的学姐志愿者，选课、违纪、生活服务、图书馆这些都可以问我哦！有什么需要帮忙的吗？😊');
}

async function send() {
  const input = document.getElementById('query');
  const btn = document.getElementById('sendBtn');
  const q = input.value.trim();
  if (!q) return;
  input.value = ''; btn.disabled = true;
  addMsg('user', q);

  // 显示"思考中"加载态
  let loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.textContent = '正在思考…';
  document.getElementById('messages').appendChild(loadingDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  const body = {
    query: q, top_k: 5,
    use_reranker: true,
    use_rewrite: true,
    stream: true,
    force_web_search: forceWebSearch,
    conversation_history: conversationHistory,
  };

  try {
    // SSE 流式
    const resp = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `服务器错误 (${resp.status})`);
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let answer = '', sources = null, msgDiv = null, textDiv = null;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      for (const line of text.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'token') {
          answer += data.content;
          if (!msgDiv) {
            // 收到第一个 token，移除加载态
            if (loadingDiv) { loadingDiv.remove(); loadingDiv = null; }

            msgDiv = document.createElement('div');
            msgDiv.className = 'msg assistant';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = 'AI';
            msgDiv.appendChild(avatar);

            const body = document.createElement('div');
            textDiv = document.createElement('div');
            textDiv.className = 'text';
            body.appendChild(textDiv);
            msgDiv.appendChild(body);

            document.getElementById('messages').appendChild(msgDiv);
          }
          textDiv.innerHTML = marked.parse(answer);
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        } else if (data.type === 'sources') {
          sources = data.sources;
          if (textDiv && textDiv.parentNode) {
            // 移除旧的 sources div（流式可能多次推送）
            const oldSrc = textDiv.parentNode.querySelector('.sources');
            if (oldSrc) oldSrc.remove();

            const srcDiv = document.createElement('div');
            srcDiv.className = 'sources';
            const names = sources.map((s, i) => `[${i + 1}] ${s.filename}`).join('，');
            srcDiv.textContent = '📎 参考来源：' + names;
            textDiv.parentNode.appendChild(srcDiv);
          }
        } else if (data.type === 'meta') {
          if (data.web_search_used && textDiv && textDiv.parentNode) {
            const oldMeta = textDiv.parentNode.querySelector('.web-indicator');
            if (oldMeta) oldMeta.remove();
            const metaDiv = document.createElement('div');
            metaDiv.className = 'web-indicator active';
            metaDiv.textContent = '🌐 本次回答参考了网络搜索结果';
            textDiv.parentNode.appendChild(metaDiv);
          }
        } else if (data.type === 'error') {
          if (loadingDiv) { loadingDiv.remove(); loadingDiv = null; }
          addMsg('assistant', `❌ ${data.message}`);
        }
      }
    }
    // 记录本轮对话历史
    conversationHistory.push({role: 'user', content: q});
    conversationHistory.push({role: 'assistant', content: answer});
    if (conversationHistory.length > MAX_HISTORY) {
      conversationHistory = conversationHistory.slice(-MAX_HISTORY);
    }
  } catch (e) {
    if (loadingDiv) { loadingDiv.remove(); loadingDiv = null; }
    addMsg('assistant', `❌ ${e.message || '网络连接失败，请检查服务是否已启动'}`);
  } finally {
    btn.disabled = false;
  }
}

// ========== 文档上传 ==========

function uploadDoc() {
  if (!_fileInput) {
    _fileInput = document.createElement('input');
    _fileInput.type = 'file';
    _fileInput.accept = '.txt,.md,.pdf';
    _fileInput.onchange = doUpload;
  }
  _fileInput.value = '';
  _fileInput.click();
}

async function doUpload() {
  const file = _fileInput.files[0];
  if (!file) return;

  const maxMB = 10;
  if (file.size > maxMB * 1024 * 1024) {
    showToast(`文件过大（${(file.size / 1024 / 1024).toFixed(1)}MB），上限 ${maxMB}MB`, 'err');
    return;
  }

  showToast(`⏳ 正在上传 ${file.name} …`, '');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch(UPLOAD_API, { method: 'POST', body: formData });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || err.message || `服务器错误 (${resp.status})`);
    }
    const result = await resp.json();
    showToast(`✅ ${result.filename} 已上传（${result.chunk_count} 个片段，即刻可用）`, 'ok');
  } catch (e) {
    showToast(`❌ 上传失败：${e.message}`, 'err');
  }
}

function showToast(msg, type) {
  const old = document.querySelector('.toast');
  if (old) old.remove();

  const toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' ' + type : '');
  toast.textContent = msg;
  document.body.appendChild(toast);

  if (type) setTimeout(() => toast.remove(), 3000);
}

addMsg('assistant', '嗨～我是北师大的学姐志愿者，选课、违纪、生活服务、图书馆这些都可以问我哦！有什么需要帮忙的吗？😊');
</script>
</body>
</html>
